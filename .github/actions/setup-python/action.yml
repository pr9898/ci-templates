name: Setup Python
description: Install Python via uv and enable uv cache keyed on lockfile hash.

inputs:
  python-version:
    description: Python version (e.g. '3.12', '3.11').
    required: false
    default: '3.12'
  working-directory:
    description: Directory containing uv.lock or requirements*.txt.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        cache-dependency-glob: |
          ${{ inputs.working-directory }}/uv.lock
          ${{ inputs.working-directory }}/requirements*.txt

    - name: Install Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}
