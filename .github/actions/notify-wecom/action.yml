name: Notify WeCom
description: Send markdown message to WeCom group bot. Requires WECOM_BOT_KEY env var.

inputs:
  title:
    description: Message title (e.g. "🚀 CI 开始" / "✅ CI 完成" / "❌ CI 失败").
    required: true
  status:
    description: Status string (started / success / failure).
    required: true
  extra:
    description: Extra markdown lines to append to the message body.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Send WeCom notification
      if: ${{ env.WECOM_BOT_KEY != '' }}
      shell: bash
      env:
        WECOM_BOT_KEY: ${{ env.WECOM_BOT_KEY }}
        TITLE: ${{ inputs.title }}
        STATUS: ${{ inputs.status }}
        EXTRA: ${{ inputs.extra }}
      run: |
        set -euo pipefail

        REPO="$GITHUB_REPOSITORY"
        BRANCH="${GITHUB_REF#refs/heads/}"
        if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
          BRANCH="${GITHUB_HEAD_REF:-$BRANCH}"
        fi
        ACTOR="$GITHUB_ACTOR"
        RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        EVENT="$GITHUB_EVENT_NAME"

        # 状态图标映射
        case "$STATUS" in
          success) STATUS_ICON="✅" ;;
          failure) STATUS_ICON="❌" ;;
          started) STATUS_ICON="🚀" ;;
          *)       STATUS_ICON="ℹ️" ;;
        esac

        # 事件名中文化
        case "$EVENT" in
          pull_request)      EVENT_CN="Pull Request" ;;
          push)              EVENT_CN="Push" ;;
          workflow_dispatch) EVENT_CN="手动触发" ;;
          schedule)          EVENT_CN="定时任务" ;;
          *)                 EVENT_CN="$EVENT" ;;
        esac

        # 状态颜色
        if [ "$STATUS" = "failure" ]; then
          STATUS_COLOR="warning"
        else
          STATUS_COLOR="info"
        fi

        # 用 printf 构造消息，确保 \n 是真正的换行符
        # 企业微信 markdown 用 > 作为引用块，每行都要有 > 前缀
        {
          printf '%s\n' "$TITLE"
          printf '> \n'
          printf '> 📦 仓库　　<font color="info">%s</font>\n' "$REPO"
          printf '> 🌿 分支　　<font color="info">%s</font>\n' "$BRANCH"
          printf '> 👤 触发者　%s\n' "$ACTOR"
          printf '> ⚙️ 事件　　%s\n' "$EVENT_CN"
          printf '> %s 状态　　<font color="%s">%s</font>\n' "$STATUS_ICON" "$STATUS_COLOR" "$STATUS"
          if [ -n "$EXTRA" ]; then
            printf '> \n'
            # extra 可能是多行，每行确保以 > 开头
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                # 去掉已有的 > 前缀（避免重复），再统一加
                clean="${line#> }"
                clean="${clean#>}"
                printf '> %s\n' "$clean"
              else
                printf '> \n'
              fi
            done <<< "$EXTRA"
          fi
          printf '> \n'
          printf '> 👉 [查看 CI 详情](%s)\n' "$RUN_URL"
        } > /tmp/wecom_content.txt

        CONTENT=$(cat /tmp/wecom_content.txt)

        # Build JSON payload with jq to avoid escaping issues
        PAYLOAD=$(jq -nc --arg content "$CONTENT" '{msgtype:"markdown",markdown:{content:$content}}')

        # Send to WeCom webhook (network failures should not fail the CI step)
        RESPONSE=$(curl -sS -X POST \
          "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WECOM_BOT_KEY}" \
          -H 'Content-Type: application/json' \
          -d "$PAYLOAD" 2>/dev/null || echo '{"errcode":-1,"errmsg":"curl network error"}')

        # Check response
        ERRMSG=$(echo "$RESPONSE" | jq -r '.errmsg // empty' 2>/dev/null || echo "parse error")
        ERRCODE=$(echo "$RESPONSE" | jq -r '.errcode // empty' 2>/dev/null || echo "-1")
        if [ "$ERRCODE" != "0" ] && [ -n "$ERRCODE" ]; then
          echo "::warning::WeCom webhook returned errcode=${ERRCODE} errmsg=${ERRMSG}"
          echo "Response: $RESPONSE"
        else
          echo "WeCom notification sent: ${TITLE}"
        fi

        # Always exit 0 — notification failures must not block CI
        exit 0

    - name: Skip when WECOM_BOT_KEY unset
      if: ${{ env.WECOM_BOT_KEY == '' }}
      shell: bash
      run: echo "::warning::secret WECOM_BOT_KEY not set, skipping WeCom notification"
