name: Notify WeCom
description: Send markdown message to WeCom group bot. Requires WECOM_BOT_KEY env var.

inputs:
  title:
    description: Message title (e.g. "🚀 CI 开始" / "✅ CI 完成" / "❌ CI 失败").
    required: true
  status:
    description: Status string (started / success / failure).
    required: true
  extra:
    description: Extra markdown lines to append to the message body.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Send WeCom notification
      if: ${{ env.WECOM_BOT_KEY != '' }}
      shell: bash
      env:
        WECOM_BOT_KEY: ${{ env.WECOM_BOT_KEY }}
        TITLE: ${{ inputs.title }}
        STATUS: ${{ inputs.status }}
        EXTRA: ${{ inputs.extra }}
      run: |
        set -euo pipefail

        REPO="$GITHUB_REPOSITORY"
        BRANCH="${GITHUB_REF#refs/heads/}"
        if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
          BRANCH="${GITHUB_HEAD_REF:-$BRANCH}"
        fi
        ACTOR="$GITHUB_ACTOR"
        RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        EVENT="$GITHUB_EVENT_NAME"

        # Build markdown content
        CONTENT="${TITLE}"
        CONTENT="${CONTENT}\n> **仓库**: \`${REPO}\`"
        CONTENT="${CONTENT}\n> **分支**: \`${BRANCH}\`"
        CONTENT="${CONTENT}\n> **触发者**: ${ACTOR}"
        CONTENT="${CONTENT}\n> **事件**: ${EVENT}"
        CONTENT="${CONTENT}\n> **状态**: ${STATUS}"
        if [ -n "$EXTRA" ]; then
          CONTENT="${CONTENT}\n${EXTRA}"
        fi
        CONTENT="${CONTENT}\n> [查看 CI 详情](${RUN_URL})"

        # Build JSON payload with jq to avoid escaping issues
        PAYLOAD=$(jq -nc --arg content "$CONTENT" '{msgtype:"markdown",markdown:{content:$content}}')

        # Send to WeCom webhook (network failures should not fail the CI step)
        RESPONSE=$(curl -sS -X POST \
          "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WECOM_BOT_KEY}" \
          -H 'Content-Type: application/json' \
          -d "$PAYLOAD" 2>/dev/null || echo '{"errcode":-1,"errmsg":"curl network error"}')

        # Check response
        ERRMSG=$(echo "$RESPONSE" | jq -r '.errmsg // empty' 2>/dev/null || echo "parse error")
        ERRCODE=$(echo "$RESPONSE" | jq -r '.errcode // empty' 2>/dev/null || echo "-1")
        if [ "$ERRCODE" != "0" ] && [ -n "$ERRCODE" ]; then
          echo "::warning::WeCom webhook returned errcode=${ERRCODE} errmsg=${ERRMSG}"
          echo "Response: $RESPONSE"
        else
          echo "WeCom notification sent: ${TITLE}"
        fi

        # Always exit 0 — notification failures must not block CI
        exit 0

    - name: Skip when WECOM_BOT_KEY unset
      if: ${{ env.WECOM_BOT_KEY == '' }}
      shell: bash
      run: echo "::warning::secret WECOM_BOT_KEY not set, skipping WeCom notification"
