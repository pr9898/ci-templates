name: Setup Security Tools
description: Install Trivy and Conftest for IaC and filesystem scanning.

inputs:
  trivy-version:
    description: Trivy version to install.
    required: false
    default: latest
  conftest-version:
    description: Conftest version (without leading 'v').
    required: false
    default: "0.56.0"

runs:
  using: composite
  steps:
    - name: Install Trivy
      shell: bash
      env:
        TRIVY_VERSION: ${{ inputs.trivy-version }}
      run: |
        set -euo pipefail
        if [ "$TRIVY_VERSION" = "latest" ]; then
          # 用 GitHub API 解析最新版本；CI runner 不限流
          TRIVY_VERSION=$(curl -sS https://api.github.com/repos/aquasecurity/trivy/releases/latest \
            | grep -oP '"tag_name":\s*"\Kv[^"]+')
          if [ -z "$TRIVY_VERSION" ]; then
            echo "::error::无法解析 Trivy 最新版本（GitHub API 限流？）"
            exit 1
          fi
        fi
        SHORT="${TRIVY_VERSION#v}"
        URL="https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${SHORT}_Linux-64bit.tar.gz"
        echo "下载 Trivy: $URL"
        curl -fSL -o /tmp/trivy.tar.gz "${URL}"
        sudo tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
        rm /tmp/trivy.tar.gz
        trivy --version

    - name: Cache Trivy DB
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/trivy/db
          ~/.cache/trivy/metadata
        key: trivy-db-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          trivy-db-${{ runner.os }}-
      id: trivy-cache

    - name: Download Trivy DB (if cache miss)
      if: steps.trivy-cache.outputs.cache-hit != 'true'
      shell: bash
      run: trivy image --download-db-only --quiet || true

    - name: Install Conftest
      shell: bash
      run: |
        VERSION="v${{ inputs.conftest-version }}"
        SHORT="${{ inputs.conftest-version }}"
        URL="https://github.com/open-policy-agent/conftest/releases/download"
        curl -sSL -o /tmp/conftest.tar.gz \
          "${URL}/${VERSION}/conftest_${SHORT}_Linux_x86_64.tar.gz"
        sudo tar -xzf /tmp/conftest.tar.gz -C /usr/local/bin conftest
        rm /tmp/conftest.tar.gz
        conftest --version
