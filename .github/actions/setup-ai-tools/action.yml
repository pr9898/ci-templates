name: Setup AI Tools
description: Install Node.js and AI/JSON tooling (promptfoo, ajv, commitlint) via npx.

inputs:
  node-version:
    description: Node.js version for running npx-based tools.
    required: false
    default: "20"

runs:
  using: composite
  steps:
    - name: Install Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}

    - name: Cache npm _cacache
      uses: actions/cache@v5
      with:
        path: ~/.npm
        key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/bun.lock') }}
        restore-keys: |
          npm-${{ runner.os }}-

    - name: Verify tools available
      shell: bash
      run: |
        set -euo pipefail
        # Prefetch into npm cache so first npx call in subsequent steps is fast.
        # Failures here are non-fatal — the actual step will surface a clear error if a tool is missing.
        npx --yes ajv --version || echo "::warning::ajv not reachable via npx"
        npx --yes commitlint --version || echo "::warning::commitlint not reachable via npx"
        npx --yes promptfoo@latest --version || echo "::warning::promptfoo not reachable via npx"
