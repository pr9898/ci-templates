name: Standard CI

# 对外唯一入口：业务项目通过 uses: Yun-Hai-Org/ci-templates/.github/workflows/standard-ci.yml@v1 调用。
# 内部编排 notify-start → [lint / security / dependency] → notify-end。

on:
  workflow_call:
    inputs:
      project-type:
        type: string
        default: bun
        description: "bun or python (v1 supported types)"
      run-static-analysis:
        type: boolean
        default: true
        description: "Run A-class checks (type-check / lint / format)"
      run-security-scan:
        type: boolean
        default: true
        description: "Run B-class checks (semgrep / gitleaks / trivy / knip / checkov / conftest)"
      run-dependency-audit:
        type: boolean
        default: true
        description: "Run C-class checks (dep-audit / lockfile-freshness)"
      run-extended-lint:
        type: boolean
        default: false
        description: "Run hadolint / shellcheck / stylelint / sqlfluff"
      run-knip:
        type: boolean
        default: true
        description: "Run knip dead-code detection (bun only)"
      run-osv-scanner:
        type: boolean
        default: false
        description: "Run OSV scanner (slow, for scheduled runs)"
      fail-on-severity:
        type: string
        default: high
        description: "none / low / medium / high / critical"
      sonar-organization:
        type: string
        default: ""
        description: "SonarCloud organization key（配置后启用 SonarQube 扫描）"
      bun-version:
        type: string
        default: latest
      python-version:
        type: string
        default: "3.12"
      working-directory:
        type: string
        default: .
      wecom-notify:
        type: boolean
        default: true
        description: "Send WeCom notification at CI start and end"
      # ===== D 类：上线前卡点 =====
      run-release-gates:
        type: boolean
        default: false
        description: "Run D-class release gates (OPA test / Semgrep custom / Jira / Schema / commitlint)"
      jira-prefix:
        type: string
        default: ""
        description: "Jira project prefix (e.g. PROJ). Empty = format-only check."
      jira-warning-only:
        type: boolean
        default: false
        description: "Jira check failures as warnings only (transition mode)"
      schema-check-paths:
        type: string
        default: ""
        description: "Agent config glob (e.g. 'agents/*.json'). Empty = skip Schema check."
      schema-file:
        type: string
        default: "templates/agent-config.schema.json"
        description: "JSON Schema file path for Schema check"
      # ===== E 类：上线后验证 =====
      run-ai-content-test:
        type: boolean
        default: false
        description: "Run promptfoo AI content safety test"
      run-load-test:
        type: boolean
        default: false
        description: "Run k6 / Locust load test"
      run-db-benchmark:
        type: boolean
        default: false
        description: "Run pgbench DB benchmark"
      promptfoo-test-path:
        type: string
        default: ./tests/promptfoo
        description: "promptfoo test directory"
      promptfoo-fail-threshold:
        type: number
        default: 0.5
        description: "promptfoo pass-rate threshold (0-1)"
      load-test-framework:
        type: string
        default: k6
        description: "load test framework: k6 or locust"
      load-test-script:
        type: string
        default: ./tests/load/scenario.js
        description: "load test script path"
      load-test-duration:
        type: string
        default: 30s
        description: "load test duration"
      load-test-vus:
        type: number
        default: 10
        description: "virtual users"
      load-test-target-url:
        type: string
        default: ""
        description: "load test target URL"
      db-pg-version:
        type: string
        default: "16"
        description: "PostgreSQL version for pgbench"
      db-scale-factor:
        type: number
        default: 10
        description: "pgbench scale factor"
      db-duration:
        type: number
        default: 60
        description: "pgbench duration (seconds)"
      db-threshold-tps:
        type: number
        default: 500
        description: "pgbench TPS threshold"
      debug:
        type: boolean
        default: false
        description: "Enable debug output"
    secrets:
      WECOM_BOT_KEY:
        required: false
      SEMGREP_APP_TOKEN:
        required: false
      GITLEAKS_LICENSE:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      # ===== B+ 类外部安全服务 =====
      SONAR_TOKEN:
        required: false
      SNYK_TOKEN:
        required: false
      GITGUARDIAN_API_KEY:
        required: false
      # ===== E 类 AI 内容测试 =====
      OPENAI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false

# 嵌套调用 security-scans.yml / release-gates.yml 的 upload-sarif 需要
# security-events: write；调用方（业务仓库 ci.yml 或 smoke-test.yml）需显式授予
permissions:
  contents: read
  security-events: write

jobs:
  notify-start:
    name: Notify CI Start (WeCom)
    if: ${{ inputs.wecom-notify == true }}
    runs-on: ubuntu-latest
    env:
      WECOM_BOT_KEY: ${{ secrets.WECOM_BOT_KEY }}
    steps:
      - uses: actions/checkout@v5
      - name: Debug context
        if: ${{ inputs.debug == true }}
        env:
          INPUTS: ${{ toJSON(inputs) }}
        run: echo "$INPUTS"
      - uses: ./.github/actions/notify-wecom
        with:
          title: "🚀 CI 开始"
          status: started
          extra: |
            📋 检查配置
            📦 项目类型　${{ inputs.project-type }}
            🔍 静态分析　${{ inputs.run-static-analysis }}
            🛡️ 安全扫描　${{ inputs.run-security-scan }}
            📦 依赖审计　${{ inputs.run-dependency-audit }}
            🚦 上线卡点　${{ inputs.run-release-gates }}
            🤖 AI 内容　${{ inputs.run-ai-content-test }}
            ⚡ 压测　　　${{ inputs.run-load-test }}
            🗄️ DB 基准　${{ inputs.run-db-benchmark }}

  lint:
    name: Lint & Format
    if: ${{ inputs.run-static-analysis == true }}
    uses: ./.github/workflows/lint-checks.yml
    with:
      project-type: ${{ inputs.project-type }}
      run-extended-lint: ${{ inputs.run-extended-lint }}
      bun-version: ${{ inputs.bun-version }}
      python-version: ${{ inputs.python-version }}
      working-directory: ${{ inputs.working-directory }}
    secrets: inherit

  security:
    name: Security Scan
    if: ${{ inputs.run-security-scan == true }}
    uses: ./.github/workflows/security-scans.yml
    with:
      project-type: ${{ inputs.project-type }}
      run-knip: ${{ inputs.run-knip }}
      fail-on-severity: ${{ inputs.fail-on-severity }}
      sonar-organization: ${{ inputs.sonar-organization }}
      bun-version: ${{ inputs.bun-version }}
      working-directory: ${{ inputs.working-directory }}
    secrets: inherit

  dependency:
    name: Dependency Audit
    if: ${{ inputs.run-dependency-audit == true }}
    uses: ./.github/workflows/dependency-audit.yml
    with:
      project-type: ${{ inputs.project-type }}
      run-osv-scanner: ${{ inputs.run-osv-scanner }}
      fail-on-severity: ${{ inputs.fail-on-severity }}
      bun-version: ${{ inputs.bun-version }}
      python-version: ${{ inputs.python-version }}
      working-directory: ${{ inputs.working-directory }}
    secrets: inherit

  # ===== D 类：上线前卡点（与 A/B/C 并行） =====
  release-gates:
    name: Release Gates (D)
    if: ${{ inputs.run-release-gates == true }}
    uses: ./.github/workflows/release-gates.yml
    with:
      project-type: ${{ inputs.project-type }}
      jira-prefix: ${{ inputs.jira-prefix }}
      jira-warning-only: ${{ inputs.jira-warning-only }}
      schema-check-paths: ${{ inputs.schema-check-paths }}
      schema-file: ${{ inputs.schema-file }}
      working-directory: ${{ inputs.working-directory }}
    secrets: inherit

  # ===== E 类：上线后验证（依赖 D 类通过） =====
  ai-content:
    name: AI Content Test (E)
    if: ${{ inputs.run-ai-content-test == true && needs.release-gates.result == 'success' }}
    needs: [release-gates]
    uses: ./.github/workflows/ai-content-test.yml
    with:
      test-path: ${{ inputs.promptfoo-test-path }}
      fail-threshold: ${{ inputs.promptfoo-fail-threshold }}
      working-directory: ${{ inputs.working-directory }}
    secrets: inherit

  load-test:
    name: Load Test (E)
    if: ${{ inputs.run-load-test == true && needs.release-gates.result == 'success' }}
    needs: [release-gates]
    uses: ./.github/workflows/load-test.yml
    with:
      framework: ${{ inputs.load-test-framework }}
      test-script: ${{ inputs.load-test-script }}
      duration: ${{ inputs.load-test-duration }}
      vus: ${{ inputs.load-test-vus }}
      target-url: ${{ inputs.load-test-target-url }}
      working-directory: ${{ inputs.working-directory }}

  db-benchmark:
    name: DB Benchmark (E)
    if: ${{ inputs.run-db-benchmark == true && needs.release-gates.result == 'success' }}
    needs: [release-gates]
    uses: ./.github/workflows/db-benchmark.yml
    with:
      pg-version: ${{ inputs.db-pg-version }}
      scale-factor: ${{ inputs.db-scale-factor }}
      duration: ${{ inputs.db-duration }}
      report-threshold-tps: ${{ inputs.db-threshold-tps }}

  notify-end:
    name: Notify CI End (WeCom)
    needs: [lint, security, dependency, release-gates, ai-content, load-test, db-benchmark]
    if: ${{ always() && inputs.wecom-notify == true }}
    runs-on: ubuntu-latest
    env:
      WECOM_BOT_KEY: ${{ secrets.WECOM_BOT_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute overall status
        id: status
        shell: bash
        run: |
          LINT="${{ needs.lint.result || 'skipped' }}"
          SEC="${{ needs.security.result || 'skipped' }}"
          DEP="${{ needs.dependency.result || 'skipped' }}"
          GATES="${{ needs.release-gates.result || 'skipped' }}"
          AI="${{ needs.ai-content.result || 'skipped' }}"
          LOAD="${{ needs.load-test.result || 'skipped' }}"
          DB="${{ needs.db-benchmark.result || 'skipped' }}"

          # result 转 emoji + 中文
          result_icon() {
            case "$1" in
              success) echo "✅ 成功" ;;
              failure) echo "❌ 失败" ;;
              skipped) echo "⊘ 跳过" ;;
              *)       echo "❓ $1" ;;
            esac
          }

          FAIL=0
          [ "$LINT" = "failure" ] && FAIL=1
          [ "$SEC" = "failure" ] && FAIL=1
          [ "$DEP" = "failure" ] && FAIL=1
          [ "$GATES" = "failure" ] && FAIL=1
          [ "$AI" = "failure" ] && FAIL=1
          [ "$LOAD" = "failure" ] && FAIL=1
          [ "$DB" = "failure" ] && FAIL=1

          LINT_ICON=$(result_icon "$LINT")
          SEC_ICON=$(result_icon "$SEC")
          DEP_ICON=$(result_icon "$DEP")
          GATES_ICON=$(result_icon "$GATES")
          AI_ICON=$(result_icon "$AI")
          LOAD_ICON=$(result_icon "$LOAD")
          DB_ICON=$(result_icon "$DB")

          if [ "$FAIL" = "1" ]; then
            echo "title=❌ CI 失败" >> "$GITHUB_OUTPUT"
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "title=✅ CI 完成" >> "$GITHUB_OUTPUT"
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

          # 多行 output 用 DELIMITER 语法
          # 注意：extra 里的行不加 > 前缀，notify-wecom action 会统一添加
          {
            echo "extra<<EOF"
            echo "📋 检查结果"
            echo "🔍 静态分析　${LINT_ICON}"
            echo "🛡️ 安全扫描　${SEC_ICON}"
            echo "📦 依赖审计　${DEP_ICON}"
            echo "🚦 上线卡点　${GATES_ICON}"
            echo "🤖 AI 内容　${AI_ICON}"
            echo "⚡ 压测　　　${LOAD_ICON}"
            echo "🗄️ DB 基准　${DB_ICON}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/notify-wecom
        with:
          title: ${{ steps.status.outputs.title }}
          status: ${{ steps.status.outputs.status }}
          extra: ${{ steps.status.outputs.extra }}
