name: Dependency Audit

# C 类：依赖审计（dep-audit / py-dep-audit / lockfile-freshness）
# 被 standard-ci.yml 调用，不直接被业务项目调用。

on:
  workflow_call:
    inputs:
      project-type:
        type: string
        required: true
      run-osv-scanner:
        type: boolean
        default: false
        description: "Run OSV scanner (slow, recommended for scheduled runs)"
      fail-on-severity:
        type: string
        default: high
        description: "none / low / medium / high / critical"
      bun-version:
        type: string
        default: latest
      python-version:
        type: string
        default: "3.12"
      working-directory:
        type: string
        default: .

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        if: inputs.project-type == 'bun' && hashFiles('package.json') != ''
        uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ inputs.bun-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Setup Python
        if: inputs.project-type == 'python' && hashFiles('pyproject.toml', 'setup.py', 'requirements.txt') != ''
        uses: ./.github/actions/setup-python
        with:
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Lockfile freshness (Bun)
        if: inputs.project-type == 'bun' && hashFiles('package.json') != ''
        run: bun install --frozen-lockfile

      - name: Lockfile freshness (Python)
        if: inputs.project-type == 'python' && hashFiles('pyproject.toml', 'setup.py', 'requirements.txt') != ''
        run: uv sync --frozen

      - name: Bun audit
        if: inputs.project-type == 'bun' && hashFiles('package.json') != ''
        run: |
          if [ "${{ inputs.fail-on-severity }}" = "none" ]; then
            bun audit --production || echo "::warning::bun audit found vulnerabilities (fail-on-severity=none)"
          else
            bun audit --production
          fi

      - name: pip-audit
        if: inputs.project-type == 'python' && hashFiles('pyproject.toml', 'setup.py', 'requirements.txt') != ''
        run: |
          if [ "${{ inputs.fail-on-severity }}" = "none" ]; then
            uv run pip-audit || echo "::warning::pip-audit found vulnerabilities (fail-on-severity=none)"
          else
            uv run pip-audit
          fi

      - name: Skip dependency audit (no manifest)
        if: (inputs.project-type == 'bun' && hashFiles('package.json') == '') || (inputs.project-type == 'python' && hashFiles('pyproject.toml', 'setup.py', 'requirements.txt') == '')
        run: |
          if [ "${{ inputs.project-type }}" = "bun" ]; then
            echo "::notice::未发现 package.json，跳过 bun audit / lockfile-freshness"
            echo "::notice::模板仓库或无 JS 依赖时正常，业务仓库有 package.json 时自动启用"
          else
            echo "::notice::未发现 pyproject.toml/setup.py/requirements.txt，跳过 pip-audit"
            echo "::notice::业务仓库有 Python manifest 文件时自动启用"
          fi

      - name: OSV Scanner
        if: inputs.run-osv-scanner == true
        run: |
          # 直接安装 osv-scanner CLI：google/osv-scanner-action 无 v1 tag
          VERSION=$(curl -sS https://api.github.com/repos/google/osv-scanner/releases/latest \
            | grep -oP '"tag_name":\s*"\Kv[^"]+')
          curl -fSL -o /tmp/osv-scanner.tar.gz \
            "https://github.com/google/osv-scanner/releases/download/${VERSION}/osv-scanner_${VERSION#v}_linux_amd64.tar.gz"
          sudo tar -xzf /tmp/osv-scanner.tar.gz -C /usr/local/bin osv-scanner
          rm /tmp/osv-scanner.tar.gz
          set +e
          osv-scanner -r ./
          EXIT=$?
          case "$EXIT" in
            0) echo "✓ OSV Scanner 扫描通过" ;;
            1) echo "::error::OSV Scanner 发现漏洞，详见上方输出"; exit 1 ;;
            *) echo "::warning::OSV Scanner 异常（exit $EXIT），跳过"; exit 0 ;;
          esac

      - name: Skip OSV Scanner (disabled)
        if: inputs.run-osv-scanner != true
        run: |
          echo "::notice::run-osv-scanner=false，跳过 OSV 全量漏洞库扫描"
          echo "::notice::OSV 较慢，建议 schedule 触发：run-osv-scanner: true"
