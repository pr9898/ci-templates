name: Validate Workflows

# 仓库自身 CI：校验所有 workflow 与 composite action 的 YAML 语法和 GitHub Actions schema。
# 业务项目不需要调用此工作流。

on:
  push:
    branches: [main]
  pull_request:

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          level: error
          fail_level: error
          reporter: github-check

  yamllint:
    name: Yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: yamllint -c .yamllint.yml .github/ templates/

  prettier-check:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install prettier
        run: bun add prettier
      - name: Run prettier --check
        run: bun prettier --check '.github/**/*.yml' '.github/**/*.yaml' 'templates/**/*.yml' 'docs/**/*.md'
