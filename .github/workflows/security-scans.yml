name: Security Scans

# B 类：安全扫描（semgrep / gitleaks / trivy / knip / checkov / conftest）
# 被 standard-ci.yml 调用，不直接被业务项目调用。

on:
  workflow_call:
    inputs:
      project-type:
        type: string
        required: true
      run-knip:
        type: boolean
        default: true
        description: "Run knip dead-code detection (bun only)"
      fail-on-severity:
        type: string
        default: high
        description: "none / low / medium / high / critical"
      bun-version:
        type: string
        default: latest
      working-directory:
        type: string
        default: .
    secrets:
      SEMGREP_APP_TOKEN:
        required: false
      GITLEAKS_LICENSE:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false
      SNYK_TOKEN:
        required: false
      GITGUARDIAN_API_KEY:
        required: false

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup security tools (Trivy + Conftest)
        uses: ./.github/actions/setup-security-tools

      - name: Setup Bun (for knip)
        if: inputs.project-type == 'bun' && inputs.run-knip == true
        uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ inputs.bun-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Semgrep
        if: ${{ env.SEMGREP_APP_TOKEN != '' }}
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
          generate-sarif: true

      - name: Skip Semgrep (no token)
        if: ${{ env.SEMGREP_APP_TOKEN == '' }}
        run: echo "::warning::secret SEMGREP_APP_TOKEN not set, skipping semgrep"

      - name: Upload Semgrep SARIF
        if: ${{ env.SEMGREP_APP_TOKEN != '' && always() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Trivy filesystem scan
        run: |
          case "${{ inputs.fail-on-severity }}" in
            critical) SEVERITY="CRITICAL" ;;
            high)     SEVERITY="HIGH,CRITICAL" ;;
            medium)   SEVERITY="MEDIUM,HIGH,CRITICAL" ;;
            low)      SEVERITY="LOW,MEDIUM,HIGH,CRITICAL" ;;
            none)     SEVERITY="LOW,MEDIUM,HIGH,CRITICAL"; EXIT_CODE=0 ;;
            *)        SEVERITY="HIGH,CRITICAL" ;;
          esac
          EXIT_CODE="${EXIT_CODE:-1}"
          trivy fs --severity "$SEVERITY" --exit-code "$EXIT_CODE" --quiet .

      - name: Trivy config scan (IaC)
        run: trivy config --quiet . || true

      - name: Knip (dead code)
        if: inputs.project-type == 'bun' && inputs.run-knip == true
        run: |
          bun install --frozen-lockfile
          bun knip --no-progress

      - name: Checkov (IaC)
        if: hashFiles('**/*.tf', '**/Dockerfile', '**/k8s*.yaml', '**/k8s*.yml') != ''
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,dockerfile,kubernetes
          compact: true
          quiet: true

      - name: Conftest (policy)
        if: hashFiles('policy/**') != ''
        run: conftest test . --combine --parser yaml,json

      # ============================================================
      # 外部安全服务（B+ 类）—— 全部 optional secret，缺失优雅跳过
      # ============================================================

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.sources=.

      - name: Skip SonarQube (no token)
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "::warning::secret SONAR_TOKEN not set, skipping SonarQube scan"

      - name: Snyk scan
        if: ${{ env.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -euo pipefail
          npm install -g snyk
          snyk auth "$SNYK_TOKEN"
          snyk test --severity-threshold=high --fail-on=all

      - name: Skip Snyk (no token)
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "::warning::secret SNYK_TOKEN not set, skipping Snyk dependency scan"

      - name: GitGuardian scan
        if: ${{ env.GITGUARDIAN_API_KEY != '' }}
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        with:
          args: secret scan ci

      - name: Skip GitGuardian (no token)
        if: ${{ env.GITGUARDIAN_API_KEY == '' }}
        run: echo "::warning::secret GITGUARDIAN_API_KEY not set, skipping GitGuardian secrets scan"
