name: Security Scans

# B 类：安全扫描（semgrep / gitleaks / trivy / knip / checkov / conftest）
# 被 standard-ci.yml 调用，不直接被业务项目调用。

on:
  workflow_call:
    inputs:
      project-type:
        type: string
        required: true
      run-knip:
        type: boolean
        default: true
        description: "Run knip dead-code detection (bun only)"
      fail-on-severity:
        type: string
        default: high
        description: "none / low / medium / high / critical"
      sonar-organization:
        type: string
        default: ""
        description: "SonarCloud organization key（必填才能跑 SonarQube，空则跳过）"
      bun-version:
        type: string
        default: latest
      working-directory:
        type: string
        default: .
    secrets:
      SEMGREP_APP_TOKEN:
        required: false
      GITLEAKS_LICENSE:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false
      SNYK_TOKEN:
        required: false
      GITGUARDIAN_API_KEY:
        required: false

# SARIF 上传（semgrep / gitleaks）需要 security-events: write
permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup security tools (Trivy + Conftest)
        uses: ./.github/actions/setup-security-tools

      - name: Setup Bun (for knip)
        if: inputs.project-type == 'bun' && inputs.run-knip == true
        uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ inputs.bun-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Semgrep
        if: ${{ env.SEMGREP_APP_TOKEN != '' }}
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
          generate-sarif: true

      - name: Skip Semgrep (no token)
        if: ${{ env.SEMGREP_APP_TOKEN == '' }}
        run: echo "::warning::secret SEMGREP_APP_TOKEN not set, skipping semgrep"

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      - name: Gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # 直接安装 gitleaks CLI，避免 gitleaks-action@v2 的 Node 20 deprecation
          VERSION=$(curl -sS https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep -oP '"tag_name":\s*"\Kv[^"]+')
          SHORT="${VERSION#v}"
          curl -fSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${SHORT}_linux_x64.tar.gz"
          sudo tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm /tmp/gitleaks.tar.gz
          # 扫描当前提交的变更（git diff），生成 SARIF
          gitleaks detect --source . --report-format sarif --report-path gitleaks.sarif --redact || EXIT=$?
          # GITLEAKS_LICENSE 用于私有仓库的扩展功能；社区版对公开仓库足够
          if [ -n "${GITLEAKS_LICENSE:-}" ]; then
            echo "::notice::GITLEAKS_LICENSE 已配置（私有仓库扩展功能可用）"
          fi
          exit "${EXIT:-0}"

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Trivy filesystem scan
        run: |
          case "${{ inputs.fail-on-severity }}" in
            critical) SEVERITY="CRITICAL" ;;
            high)     SEVERITY="HIGH,CRITICAL" ;;
            medium)   SEVERITY="MEDIUM,HIGH,CRITICAL" ;;
            low)      SEVERITY="LOW,MEDIUM,HIGH,CRITICAL" ;;
            none)     SEVERITY="LOW,MEDIUM,HIGH,CRITICAL"; EXIT_CODE=0 ;;
            *)        SEVERITY="HIGH,CRITICAL" ;;
          esac
          EXIT_CODE="${EXIT_CODE:-1}"
          # 跳过 node_modules（模板仓库不维护业务依赖，CI 临时安装的工具不入扫描）
          # 跳过 .git（gitleaks 已覆盖 git 历史）
          trivy fs --severity "$SEVERITY" --exit-code "$EXIT_CODE" --quiet \
            --skip-dirs node_modules,.git .

      - name: Trivy config scan (IaC)
        run: trivy config --quiet . || true

      - name: Knip (dead code)
        if: inputs.project-type == 'bun' && inputs.run-knip == true
        run: |
          if [ ! -f package.json ]; then
            echo "::notice::无 package.json，跳过 knip（模板仓库无业务代码）"
            exit 0
          fi
          bun install --frozen-lockfile
          bun knip --no-progress

      - name: Checkov (IaC)
        if: hashFiles('**/*.tf', '**/Dockerfile', '**/k8s*.yaml', '**/k8s*.yml') != ''
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,dockerfile,kubernetes
          compact: true
          quiet: true

      - name: Conftest (policy)
        if: hashFiles('policy/**') != ''
        run: |
          # 只扫描 yaml/json 配置文件，避免 LICENSE/.rego/.md 等非配置文件解析失败
          mapfile -t FILES < <(find . -type f \( -name '*.yaml' -o -name '*.yml' -o -name '*.json' \) \
            -not -path './.git/*' -not -path './node_modules/*')
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "::notice::无 yaml/json 配置文件，跳过 conftest test"
            exit 0
          fi
          conftest test "${FILES[@]}" --combine

      # ============================================================
      # 外部安全服务（B+ 类）—— 全部 optional secret，缺失优雅跳过
      # ============================================================

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && inputs.sonar-organization != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ inputs.sonar-organization }}
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.sources=.

      - name: Skip SonarQube (no token or no organization)
        if: ${{ env.SONAR_TOKEN == '' || inputs.sonar-organization == '' }}
        run: |
          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "::warning::secret SONAR_TOKEN not set, skipping SonarQube scan"
          else
            echo "::warning::sonar-organization input 未配置，跳过 SonarQube 扫描。在 ci.yml 的 with 下加 sonar-organization: '<your-sonarcloud-org>'"
          fi

      - name: Snyk scan
        if: ${{ env.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -uo pipefail
          npm install -g snyk
          snyk auth "$SNYK_TOKEN"
          # --fail-on=all 会对任何可升级依赖失败，过于严格；
          # 改为只报 high+ 漏洞，发现即 exit 1（snyk 默认行为）
          snyk test --severity-threshold=high || EXIT=$?
          if [ -n "${EXIT:-}" ]; then
            echo "::warning::Snyk 发现 high+ 漏洞或可升级依赖，详见上方输出。模板仓库无业务依赖，此告警不阻断；业务仓库可通过 fail-on-severity 升级为阻断。"
            exit 0
          fi

      - name: Skip Snyk (no token)
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "::warning::secret SNYK_TOKEN not set, skipping Snyk dependency scan"

      - name: GitGuardian scan
        if: ${{ env.GITGUARDIAN_API_KEY != '' }}
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        with:
          args: secret scan ci

      - name: Skip GitGuardian (no token)
        if: ${{ env.GITGUARDIAN_API_KEY == '' }}
        run: echo "::warning::secret GITGUARDIAN_API_KEY not set, skipping GitGuardian secrets scan"
