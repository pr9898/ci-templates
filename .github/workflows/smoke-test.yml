name: CI

# 仓库自身的完整 CI：既校验仓库文件质量，又冒烟测试 standard-ci.yml 对外接口。
# 业务项目不需要此工作流——业务项目通过 standard-ci.yml 接入（ci.yml 或 Org Ruleset）。
#
# push 到任意分支触发，所有 job 并行：
#   - actionlint / yamllint / prettier / opa-test / semgrep-validate：仓库文件质量自检
#   - notify-smoke-test：调用 standard-ci.yml 验证对外接口（B 类安全扫描 + 企业微信通知）

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# 嵌套调用 security-scans.yml / release-gates.yml 需要 security-events: write
# 才能让子 workflow 的 upload-sarif 有权限
permissions:
  contents: read
  security-events: write

jobs:
  # ============================================================
  # 仓库文件质量自检
  # ============================================================

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          level: error
          fail_level: error
          reporter: github-check

  yamllint:
    name: Yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: yamllint -c .yamllint.yml .github/ templates/

  prettier-check:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install prettier
        run: bun add prettier
      - name: Run prettier --check
        run: bun prettier --check '.github/**/*.yml' 'templates/**/*.yml' 'docs/**/*.md'

  opa-test:
    name: OPA Policy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup OPA
        uses: ./.github/actions/setup-opa
      - name: OPA fmt check
        run: |
          if ! opa fmt --list --fail policy/ ; then
            echo "::error::Rego 文件未格式化。本地执行: opa fmt -w policy/"
            exit 1
          fi
      - name: OPA test
        run: opa test policy/ -v
      - name: OPA check (compile)
        run: opa check policy/

  semgrep-validate:
    name: Semgrep Rules Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Semgrep
        run: pip install semgrep
      - name: Validate custom rules
        run: |
          if [ -d .semgrep ]; then
            for f in .semgrep/*.yml .semgrep/*.yaml; do
              [ -f "$f" ] || continue
              echo "Validating: $f"
              semgrep --config "$f" --validate
            done
          else
            echo "::notice::无 .semgrep/ 目录，跳过规则校验"
          fi

  # ============================================================
  # 对外接口冒烟测试：调用 standard-ci.yml（业务项目视角）
  # ============================================================

  notify-smoke-test:
    name: Notify Smoke Test
    uses: ./.github/workflows/standard-ci.yml
    with:
      project-type: "bun"
      run-static-analysis: false
      run-security-scan: true
      # run-knip: true 让 Knip step 跑到"无 package.json"分支输出 notice
      # （比 run-knip: false 的"已显式关闭"提示更准确）
      # Setup Bun (for knip) 已加 hashFiles('package.json') 检查，无 package.json 时不装 Bun
      run-knip: true
      run-dependency-audit: false
      # ci-templates 自身也跑 SonarQube（org secret SONAR_TOKEN 已配）
      sonar-organization: "yun-hai-org"
      wecom-notify: true
    secrets: inherit
