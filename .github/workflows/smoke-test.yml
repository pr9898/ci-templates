name: Smoke Test

# 仓库自身的冒烟测试：调用 standard-ci.yml 验证企业微信通知等核心功能。
# 模板仓库没有真实 TS/Python 代码，所以关闭实际检查，只验证通知链路。
# 业务项目不需要此工作流。

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/actions/notify-wecom/**"
      - ".github/workflows/standard-ci.yml"
      - ".github/workflows/smoke-test.yml"

jobs:
  notify-smoke-test:
    name: Notify Smoke Test
    uses: ./.github/workflows/standard-ci.yml
    with:
      project-type: "bun"
      run-static-analysis: false
      run-security-scan: false
      run-dependency-audit: false
      wecom-notify: true
    secrets:
      WECOM_BOT_KEY: ${{ secrets.WECOM_BOT_KEY }}
