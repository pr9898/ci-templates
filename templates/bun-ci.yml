# Bun 项目 CI 样板
#
# 接入步骤：
# 1. 复制本文件到你的仓库 .github/workflows/ci.yml
# 2. （可选）按需调整 with 下的参数
# 3. 在仓库 Settings → Secrets → Actions 配置 secrets（全部可选，缺失自动跳过）
# 4. 提交 PR，观察 CI 结果与企业微信通知

name: CI

on:
  pull_request:
  push:
    # 所有分支的 push 都触发检查（feature/fix/main 等）
    branches: ["**"]

jobs:
  ci:
    uses: pr9898/ci-templates/.github/workflows/standard-ci.yml@v1
    with:
      project-type: "bun"
      run-static-analysis: true
      run-security-scan: true
      run-dependency-audit: true
      run-extended-lint: false
      run-knip: true
      fail-on-severity: "high"
      # ===== D 类：上线前卡点（团队成熟后逐步开启） =====
      run-release-gates: false # 设为 true 启用 OPA test / 敏感数据 / Jira / Schema / commitlint
      jira-prefix: "PROJ" # 改成你的 Jira 项目前缀
      jira-warning-only: true # 过渡期：先 warning，团队习惯后改 false
      schema-check-paths: "agents/*.json" # 有 Agent 配置时启用
      # ===== E 类：上线后验证（schedule / 手动触发） =====
      run-ai-content-test: false
      run-load-test: false
      run-db-benchmark: false
      wecom-notify: true
    secrets:
      WECOM_BOT_KEY: ${{ secrets.WECOM_BOT_KEY }}
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      # ===== B+ 类外部安全服务（全部 optional） =====
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
      # ===== E 类 AI 内容测试（promptfoo 调用 LLM 用） =====
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
