# Python 项目 CI 样板
#
# 接入步骤：
# 1. 复制本文件到你的仓库 .github/workflows/ci.yml
# 2. （可选）按需调整 with 下的参数（如 python-version）
# 3. 在仓库 Settings → Secrets → Actions 配置 secrets（全部可选，缺失自动跳过）
# 4. 提交 PR，观察 CI 结果与企业微信通知

name: CI

on:
  pull_request:
  push:
    # 所有分支的 push 都触发检查（feature/fix/main 等）
    branches: ["**"]

jobs:
  ci:
    uses: Yun-Hai-Org/ci-templates/.github/workflows/standard-ci.yml@v1
    with:
      project-type: "python"
      python-version: "3.12"
      run-static-analysis: true
      run-security-scan: true
      run-dependency-audit: true
      fail-on-severity: "high"
      # ===== D 类：上线前卡点（团队成熟后逐步开启） =====
      run-release-gates: false
      jira-prefix: "PROJ"
      jira-warning-only: true
      schema-check-paths: "agents/*.json"
      # ===== E 类：上线后验证（schedule / 手动触发） =====
      run-ai-content-test: false
      run-load-test: false
      run-db-benchmark: false
      wecom-notify: true
    # secrets: inherit 自动透传 org/repo 级所有 secrets（WECOM_BOT_KEY /
    # SEMGREP_APP_TOKEN / SONAR_TOKEN / SNYK_TOKEN / GITGUARDIAN_API_KEY /
    # OPENAI_API_KEY / ANTHROPIC_API_KEY 等），未配置的自动跳过
    secrets: inherit
